<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опросник критического мышления</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e0f2f1;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            color: #00695c;
            margin-bottom: 20px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            border-bottom: 2px solid #b2dfdb;
            padding-bottom: 10px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 25px;
            transition: 0.3s;
        }
        .tab-btn:hover {
            background: #b2dfdb;
        }
        .tab-btn.active {
            background: #00695c;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active-tab {
            display: block;
        }
        .question {
            background: #f5f5f5;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 15px;
        }
        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-left: 15px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
        }
        .option:hover {
            background: #e0e0e0;
        }
        .option input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .option label {
            cursor: pointer;
            flex: 1;
        }
        button {
            background: #00695c;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #004d40;
        }
        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .btn-secondary {
            background: #80cbc4;
            color: #004d40;
        }
        .btn-secondary:hover {
            background: #4db6ac;
        }
        .progress {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: #00695c;
        }
        .result-item {
            margin-bottom: 20px;
        }
        .bar {
            background: #e0e0e0;
            height: 25px;
            border-radius: 12px;
            margin-top: 5px;
            overflow: hidden;
        }
        .bar-fill {
            background: #00695c;
            height: 100%;
            width: 0%;
            transition: width 0.5s;
        }
        .advice {
            background: #e0f2f1;
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
        }
        .total {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        footer {
            text-align: center;
            font-size: 12px;
            color: #666;
        }
        .error {
            background: #ffcdd2;
            color: #c62828;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyxMBdiguzixpVtVeBAUkdkeMqAiK74Mde0ZWSAnyz2jFShG8RlRu-vhIyIfCvpX_OW/exec';
    
    let skills = [];
    let answers = {};
    let currentTab = 0;
    let page = 'start';
    let results = null;
    let sessionId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    
    const app = document.getElementById('app');
    
    async function loadQuestions() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            if (data && data.length) {
                skills = data;
                render();
            } else {
                app.innerHTML = '<div class="card"><div class="error">Нет вопросов в таблице</div></div>';
            }
        } catch(e) {
            app.innerHTML = '<div class="card"><div class="error">Ошибка загрузки вопросов</div></div>';
        }
    }
    
    function render() {
        if (page === 'start') renderStart();
        else if (page === 'quiz') renderQuiz();
        else if (page === 'results') renderResults();
    }
    
    function renderStart() {
        app.innerHTML = `
            <div class="card">
                <h1>🧠 Критическое мышление в биологии</h1>
                <p>Критическое мышление — это способность анализировать информацию, оценивать доказательства и принимать обоснованные решения.</p>
                <p><strong>Как работает тест:</strong></p>
                <ul style="margin-left: 20px; margin-bottom: 20px;">
                    <li>5 блоков вопросов</li>
                    <li>Переключайтесь кнопками "Далее" и "Назад"</li>
                    <li>Нельзя пропускать вопросы</li>
                    <li>В конце — подробные результаты и советы</li>
                </ul>
                <div style="text-align: center;">
                    <button id="startBtn">🚀 Начать тест</button>
                </div>
            </div>
            <footer>Результаты анонимно сохраняются в Google Таблицу</footer>
        `;
        document.getElementById('startBtn')?.addEventListener('click', () => {
            page = 'quiz';
            render();
        });
    }
    
    function renderQuiz() {
        if (!skills.length) return;
        
        // Инициализация ответов
        for (let s of skills) {
            for (let q of s.questions) {
                const key = s.id + '_' + q.id;
                if (answers[key] === undefined) answers[key] = null;
            }
        }
        
        // Подсчёт прогресса
        let total = 0;
        let answered = 0;
        for (let s of skills) {
            for (let q of s.questions) {
                total++;
                const key = s.id + '_' + q.id;
                if (answers[key]) answered++;
            }
        }
        
        // Вкладки
        let tabsHtml = '<div class="tabs">';
        for (let i = 0; i < skills.length; i++) {
            tabsHtml += `<button class="tab-btn ${i === currentTab ? 'active' : ''}" data-tab="${i}">${skills[i].name}</button>`;
        }
        tabsHtml += '</div>';
        
        // Прогресс
        tabsHtml += `<div class="progress">📋 Отвечено: ${answered} из ${total}</div>`;
        
        // Контент текущей вкладки
        let contentHtml = '';
        for (let i = 0; i < skills.length; i++) {
            let skillHtml = '';
            for (let j = 0; j < skills[i].questions.length; j++) {
                const q = skills[i].questions[j];
                const key = skills[i].id + '_' + q.id;
                const saved = answers[key];
                
                skillHtml += `
                    <div class="question">
                        <div class="question-text">${j+1}. ${q.text}</div>
                        <div class="options">
                            ${q.options.map((opt, idx) => {
                                const letter = String.fromCharCode(65 + idx);
                                const checked = (saved === letter) ? 'checked' : '';
                                return `
                                    <div class="option">
                                        <input type="radio" name="${key}" value="${letter}" id="${key}_${letter}" ${checked}>
                                        <label for="${key}_${letter}"><strong>${letter}.</strong> ${opt}</label>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }
            contentHtml += `<div class="tab-content ${i === currentTab ? 'active-tab' : ''}" id="tab-${i}">${skillHtml}</div>`;
        }
        
        // Кнопки навигации
        const isFirst = currentTab === 0;
        const isLast = currentTab === skills.length - 1;
        
        let navHtml = '<div class="btn-group">';
        navHtml += '<div><button id="resetBtn" class="btn-secondary">⟳ Сбросить все</button></div>';
        navHtml += '<div>';
        if (!isFirst) navHtml += '<button id="prevBtn">◀ Назад</button>';
        if (!isLast) navHtml += '<button id="nextBtn">Далее ▶</button>';
        if (isLast) navHtml += '<button id="submitBtn" style="background: #2e7d32;">✅ Завершить тест</button>';
        navHtml += '</div></div>';
        
        app.innerHTML = `<div class="card">${tabsHtml}${contentHtml}${navHtml}</div><footer>Ответьте на все вопросы в каждом блоке</footer>`;
        
        // Обработчики радио
        for (let s of skills) {
            for (let q of s.questions) {
                const key = s.id + '_' + q.id;
                const radios = document.querySelectorAll(`input[name="${key}"]`);
                radios.forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        answers[key] = e.target.value;
                        render();
                    });
                });
            }
        }
        
        // Обработчики вкладок
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentTab = parseInt(btn.dataset.tab);
                render();
            });
        });
        
        // Сброс
        document.getElementById('resetBtn')?.addEventListener('click', () => {
            if (confirm('Удалить все ответы?')) {
                for (let s of skills) {
                    for (let q of s.questions) {
                        const key = s.id + '_' + q.id;
                        answers[key] = null;
                    }
                }
                render();
            }
        });
        
        // Назад
        document.getElementById('prevBtn')?.addEventListener('click', () => {
            if (currentTab > 0) {
                currentTab--;
                render();
            }
        });
        
        // Далее
        document.getElementById('nextBtn')?.addEventListener('click', () => {
            const currentSkill = skills[currentTab];
            let allOk = true;
            for (let q of currentSkill.questions) {
                const key = currentSkill.id + '_' + q.id;
                if (!answers[key]) {
                    allOk = false;
                    break;
                }
            }
            if (!allOk) {
                alert('Ответьте на все вопросы в этом блоке!');
                return;
            }
            if (currentTab < skills.length - 1) {
                currentTab++;
                render();
            }
        });
        
        // Завершение
        document.getElementById('submitBtn')?.addEventListener('click', async () => {
            let allOk = true;
            for (let s of skills) {
                for (let q of s.questions) {
                    const key = s.id + '_' + q.id;
                    if (!answers[key]) {
                        allOk = false;
                        break;
                    }
                }
            }
            if (!allOk) {
                alert('Ответьте на все вопросы во всех блоках!');
                return;
            }
            await calculateResults();
        });
    }
    
    async function calculateResults() {
        let scores = [];
        let totalEarned = 0;
        let totalMax = 0;
        
        for (let s of skills) {
            let earned = 0;
            for (let q of s.questions) {
                const key = s.id + '_' + q.id;
                if (answers[key] === q.correct) earned++;
            }
            totalEarned += earned;
            totalMax += s.questions.length;
            scores.push({
                name: s.name,
                earned: earned,
                max: s.questions.length,
                percent: (earned / s.questions.length) * 100
            });
        }
        
        const totalPercent = (totalEarned / totalMax) * 100;
        
        let advice = '';
        if (totalPercent < 40) advice = '🔍 Вам стоит развивать критическое мышление. Изучите основы логики и анализа аргументов.';
        else if (totalPercent < 70) advice = '🎯 Хороший результат! Продолжайте тренироваться, обращайте внимание на логические ошибки.';
        else advice = '🏆 Отлично! Вы прекрасно владеете навыками критического мышления!';
        
        // Отправка в Google Sheets
        for (let i = 0; i < scores.length; i++) {
            const payload = {
                session_id: sessionId,
                skill_id: skills[i].id,
                score_percent: scores[i].percent,
                total_score: totalEarned,
                answers: []
            };
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            } catch(e) {}
        }
        
        results = { scores, totalEarned, totalMax, totalPercent, advice };
        page = 'results';
        render();
    }
    
    function renderResults() {
        if (!results) return;
        
        let scoresHtml = '';
        for (let r of results.scores) {
            scoresHtml += `
                <div class="result-item">
                    <div><strong>${r.name}</strong> — ${r.earned} из ${r.max} (${r.percent.toFixed(0)}%)</div>
                    <div class="bar"><div class="bar-fill" style="width: ${r.percent}%;"></div></div>
                </div>
            `;
        }
        
        app.innerHTML = `
            <div class="card">
                <div class="total">🎯 Общий результат: ${results.totalEarned} / ${results.totalMax} (${results.totalPercent.toFixed(0)}%)</div>
                ${scoresHtml}
                <div class="advice">💬 ${results.advice}</div>
                <div style="text-align: center;">
                    <button id="restartBtn">🔄 Пройти заново</button>
                </div>
            </div>
            <footer>Спасибо за участие!</footer>
        `;
        
        document.getElementById('restartBtn')?.addEventListener('click', () => {
            answers = {};
            currentTab = 0;
            page = 'start';
            sessionId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            render();
        });
    }
    
    loadQuestions();
</script>
</body>
</html>
